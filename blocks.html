<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Блоки</title>
<style>
.outerBlock{
width:300px;
height:200px;
background:lightgray;
border:2px solid black;
display:flex;
justify-content:center;
align-items:center;
}
.innerBlock{
width:150px;
height:100px;
background:lightblue;
border:2px solid blue;
display:flex;
justify-content:center;
align-items:center;
}
.outerBlock2{
width:400px;
height:300px;
background:lightyellow;
border:3px solid orange;
display:flex;
justify-content:center;
align-items:center;
}
.middleBlock2{
width:250px;
height:180px;
background:lightgreen;
border:3px solid green;
display:flex;
justify-content:center;
align-items:center;
}
.innerBlock2{
width:120px;
height:80px;
background:pink;
border:2px solid red;
display:flex;
justify-content:center;
align-items:center;
}
.outerBlock3{
width: 300px;
height: 300px;
background: lightblue;
display: flex;
justify-content: center;
align-items: center;
}
.middleBlock3{
width: 200px;
height: 200px;
background: lightgreen;
display: flex;
justify-content: center;
align-items: center;
}
.innerBlock3{
width: 100px;
height: 100px;
background: orange;
}
.outerBlock4{
width:350px;
height:250px;
background:lightblue;
border:4px solid blue;
display:flex;
justify-content:center;
align-items:center;
}
.middleBlock4{
width:250px;
height:170px;
background:lightgreen;
border:4px solid green;
display:flex;
justify-content:center;
align-items:center;
}
.innerBlock4{
width:120px;
height:90px;
background:orange;
border:4px solid darkorange;
}
.outerBlock5{
width:400px;
height:300px;
background:linear-gradient(to right,lightblue,white);
border:5px solid navy;
border-radius:20px;
display:flex;
justify-content:center;
align-items:center;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}
.middleBlock5{
width:260px;
height:180px;
background:#c8f7c5;
border:4px dashed green;
border-radius:15px;
display:flex;
justify-content:center;
align-items:center;
opacity:0.95;
}
.innerBlock5{
width:120px;
height:100px;
background:orange;
border:3px dotted darkorange;
border-radius:10px;
transform:rotate(5deg);
display:flex;
justify-content:center;
align-items:center;
font-weight:bold;
}
</style>
</head>
<body>
<div class="outerBlock">
<div class="innerBlock">Блок1</div>
</div>
<div class="outerBlock2">
<div class="middleBlock2">
<div class="innerBlock2">Блок2</div>
</div>
</div>
<div class="outerBlock3">
<div class="middleBlock3">
<div class="innerBlock3"></div>
</div>
</div>
<div class="outerBlock4">
<div class="middleBlock4">
<div class="innerBlock4"></div>
</div>
</div>
<div class="outerBlock5">
<div class="middleBlock5">
<div class="innerBlock5">Блок5</div>
</div>
</div>
</body>
</html>
